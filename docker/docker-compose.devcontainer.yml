#
# Devcontainer override for docker/docker-compose.yml: keep the `dev` service
# running so an editor can attach, and so tasks that start their own containers
# (fuzz, oracles) reach the docker-in-docker daemon.

services:
  dev:
    command: ["sleep", "infinity"]
