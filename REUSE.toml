#
# REUSE bulk annotations for files that carry no inline SPDX header
# (manifests, config, docs). Source files (*.rs) carry their own headers.
# `reference/` and `target/` are git-ignored, hence outside `reuse lint`.

version = 1

[[annotations]]
path = [
    "Cargo.toml",
    "crates/**/Cargo.toml",
    "mise.toml",
    ".gitignore",
    "**/*.md",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 libfprint-rs (pure-Rust) contributors"
SPDX-License-Identifier = "MIT OR Apache-2.0"

# BOZORTH3 golden corpus: synthetic .xyt inputs plus the stock-NBIS reference scores. Frozen test
# oracles for the public-domain matcher; declared under its SPDX id (they carry no inline header).
[[annotations]]
path = ["crates/fp-bozorth3/tests/fixtures/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "NIST NBIS — U.S. Government work, public domain (title 17 §105)"
SPDX-License-Identifier = "LicenseRef-NBIS-PD"

# Real-libfprint FP3 blob, frozen as an interop fixture (a wire-format fact — a byte layout — not
# copyrightable expression; see ARCHITECTURE.md §Provenance & licensing).
[[annotations]]
path = ["crates/fp-fp3/tests/fixtures/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 libfprint-rs (pure-Rust) contributors"
SPDX-License-Identifier = "MIT OR Apache-2.0"
