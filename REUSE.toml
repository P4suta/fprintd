#
# REUSE bulk annotations for files that carry no inline SPDX header
# (manifests, config, docs). Source files (*.rs) carry their own headers.
# `reference/` and `target/` are git-ignored, hence outside `reuse lint`.
#
# The NIST golden fixtures are declared in crate-local `REUSE.toml` files instead
# (`crates/fprint-bozorth3/`, `crates/fprint-mindtct/`): `cargo package` ships only the crate
# directory, so a declaration kept here would not reach the published tarball. REUSE allows a
# `REUSE.toml` in any directory, covering that directory and deeper.

version = 1

[[annotations]]
path = [
  "Cargo.toml",
  "Cargo.lock",
  "crates/**/Cargo.toml",
  "xtask/Cargo.toml",
  "fuzz/Cargo.toml",
  "fuzz/Cargo.lock",
  "mise.toml",
  ".gitignore",
  "fuzz/.gitignore",
  "**/*.md",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 fprintd (pure-Rust) contributors"
SPDX-License-Identifier = "MIT OR Apache-2.0"

# JSON carries no comment syntax, so these editor/tooling configs cannot hold an inline SPDX
# header and are declared here instead.
[[annotations]]
path = [
  ".vscode/settings.json",
  ".vscode/extensions.json",
  ".vscode/tasks.json",
  ".vscode/launch.json",
  ".devcontainer/devcontainer.json",
  ".github/renovate.json",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 fprintd (pure-Rust) contributors"
SPDX-License-Identifier = "MIT OR Apache-2.0"

# Licence texts mirrored into each published crate (by `cargo xtask sync-licenses`) so an extracted
# tarball is self-describing. In an extracted crate they sit at its root `LICENSES/` and `reuse`
# recognises them directly; here, nested under a crate, they are ordinary files and declared instead.
[[annotations]]
path = ["crates/*/LICENSES/*.txt"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 fprintd (pure-Rust) contributors"
SPDX-License-Identifier = "MIT OR Apache-2.0"

# Real-libfprint FP3 blobs, frozen as interop fixtures (a wire-format fact — a byte layout — not
# copyrightable expression; see ARCHITECTURE.md §Provenance & licensing). The NBIS one is minutiae
# from a synthetic image, not from a finger.
[[annotations]]
path = ["crates/fprint-fp3/tests/fixtures/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 fprintd (pure-Rust) contributors"
SPDX-License-Identifier = "MIT OR Apache-2.0"
