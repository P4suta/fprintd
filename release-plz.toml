#
# release-plz drives the workspace release: reads Conventional Commits, derives the version bump,
# writes each crate's CHANGELOG from cliff.toml, opens the Release PR, and on merge publishes in
# dependency order, then tags and cuts the GitHub release. Run by .github/workflows/release.yml.
#
# Publish order (also for a manual `cargo publish` sweep):
#   core -> {bozorth3, mindtct} -> pipeline -> fp3 -> backend-libfprint
# `pipeline` precedes `fp3` because `fp3` carries a versioned dev-dependency on it (the nbis-match
# seam test, kept in the tarball), which crates.io requires present at publish time. release-plz's
# toposort accounts for dev-deps; a hand publish must follow this order manually.

[workspace]
# One version for the whole tree (version.workspace = true); do not let release-plz split crates
# onto independent version lines.
dependencies_update = false
changelog_config = "cliff.toml"
git_release_enable = true
pr_labels = ["release"]

# The publish = false members. release-plz must not version-bump, changelog, tag, or publish them.
# Listing each keeps the release set equal to the workspace's publishable crates (checked by
# `cargo xtask publish-check`'s release_parity).
[[package]]
name = "fprintd"
release = false

[[package]]
name = "fprint-cli"
release = false

[[package]]
name = "fprint-driverkit"
release = false

[[package]]
name = "fprint-backend-native"
release = false

[[package]]
name = "fprint-integration"
release = false

[[package]]
name = "fprint-testkit"
release = false

[[package]]
name = "xtask"
release = false
