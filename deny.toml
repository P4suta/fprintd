# SPDX-License-Identifier: MIT OR Apache-2.0
#
# Supply-chain rules, checked by `cargo deny check` (mise run deny, and a CI job).
#
# cargo-deny adds no dependency; it is a CLI that reads Cargo.lock. It enforces:
#  1. The licence boundary (allow-list below): keep new copyleft crates out of the graph.
#  2. The `=` pins: `[bans] wildcards = "deny"`.
#  3. Advisories over fprintd's zbus/tokio graph and the shim's glib/gio (the pure crates have no
#     dependencies to audit).

[graph]
# All features and all targets, so the Linux-only shim and daemon are in scope from any host.
# cargo-deny resolves from `cargo metadata`, so this needs neither Linux nor Docker.
all-features = true

[advisories]
version = 2
# `warn`, not `deny`: the shim's `libfprint-sys` is a thin FFI dep over the system libfprint, and a
# yank no commit can act on must be visible rather than fail the build.
yanked = "warn"
# Both entries are *unmaintained* advisories (informational, not vulnerabilities), reachable only
# through `fprint-driverkit`'s (publish = false) diagnostic imaging (`image` / `imageproc`). Nothing
# shipped or published reaches either. Each carries a `reason`. See docs/known-issues.md §Supply chain.
ignore = [
  # `ttf-parser` (unmaintained): imageproc -> ab_glyph -> owned_ttf_parser -> ttf-parser, reached
  # only via imageproc's glyph/text-drawing path, which this repo never uses (the overlay draws
  # circles and lines, not text).
  { id = "RUSTSEC-2026-0192", reason = "unmaintained transitive dep of the publish=false fpdev tool; its text-drawing path is unused — see docs/known-issues.md §Supply chain" },
  # `paste` (unmaintained): image -> exr -> pulp -> paste, a proc-macro helper reached only through
  # the `image` crate's OpenEXR codec, one of the formats fpdev's diagnostic save/open never emits.
  { id = "RUSTSEC-2024-0436", reason = "unmaintained proc-macro transitively under the publish=false fpdev tool's image codecs — see docs/known-issues.md §Supply chain" },
]

[licenses]
version = 2
# Every entry is reachable in the current graph:
#   Apache-2.0 WITH LLVM-exception — target-lexicon offers nothing else
#   BSD-3-Clause                   — bindgen (the shim's FFI generator)
#   ISC                            — libloading
#   Unicode-3.0                    — unicode-ident, as `(MIT OR Apache-2.0) AND Unicode-3.0`
#   BSD-2-Clause, Unlicense        — mach2, memchr, aho-corasick, each beside MIT
#
# Two more are reachable through `fprint-driverkit`'s (publish = false) diagnostic imaging:
#   Zlib — the `image` crate's PNG deflate codec (`miniz_oxide`, `zune-inflate`, `bytemuck`, …),
#          for the `fpdev` overlay's PNG save/open; permissive
#   NCSA — `libfuzzer-sys`, the fuzz harness's runtime (University of Illinois/NCSA, permissive)
#
# No `[[licenses.exceptions]]`. The LGPL boundary is the C libfprint `.so` we dynamically link; the
# Rust binding `libfprint-sys` is MIT. The one crate offering LGPL (`r-efi`) offers MIT beside it.
# Every allowed license is permissive; the policy polices one boundary, LGPL, and nothing crosses it.
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MIT",
  "NCSA",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]

[bans]
# Reject `*` requirements; the exact `=` pins are allowed.
wildcards = "deny"
# A version-less path dependency is a `*` requirement, used on purpose: omitting the version is what
# makes `cargo publish` strip a dev-dependency from the tarball, keeping `fprint-testkit` and
# `fprint-backend-native` out of the shipped crates (`cargo xtask publish-check` verifies the
# packaged manifests). Registry wildcards, the actual risk, are still refused.
allow-wildcard-paths = true
# `warn`: the glib/gio/zbus graph carries duplicates this project does not control.
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
