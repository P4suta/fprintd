#
# Crate-local REUSE annotations. This lives inside the crate (rather than in the workspace root
# REUSE.toml) on purpose: `cargo package` ships only this directory, so an annotation kept at the
# root would not travel with the published tarball — and the fixtures below are the one thing here
# that is NOT ours. Keeping the declaration next to them makes the published artifact self-describing.

version = 1

# MINDTCT golden corpus: grayscale fingerprint images plus the stock-NBIS reference xyt output and
# per-stage maps. Frozen test oracles (they carry no inline header), shipped so the golden suite is
# runnable straight from the published crate — no Docker, no oracle regeneration, no sibling crates.
# The reference output is NIST's, not ours; the crate's own code is `MIT OR Apache-2.0`.
[[annotations]]
path = ["tests/fixtures/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "NIST NBIS — U.S. Government work, public domain (title 17 §105)"
SPDX-License-Identifier = "LicenseRef-NBIS-PD"
