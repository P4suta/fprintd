#
# committed checks the one thing release-plz and git-cliff need from a commit — a Conventional
# Commits type prefix (feat/fix/build/ci/test/docs/refactor) — and nothing that would fight this
# project's expressive subject style. The length and capitalization rules are off on purpose: the
# subjects here are prose, longer than 72 and lower-case by convention, and that is deliberate.

style = "conventional"
subject_length = 0
line_length = 0
subject_capitalized = false
imperative_subject = false
allowed_types = [
  "feat",
  "fix",
  "build",
  "ci",
  "docs",
  "test",
  "refactor",
  "perf",
  "style",
  "chore",
  "revert",
]
