# mise-managed toolchain for this project.
# Extends the global config at ~/.config/mise/config.toml (global tools stay available:
# rust, just, taplo, typos, lefthook, gh, ripgrep, fd, ...). This file only adds/pins
# what THIS project needs so the dev environment is reproducible.

[tools]
rust = "stable"          # matches the global `rust = "stable"` symlink
tokei = "latest"         # SLOC measurement for the M0 ground-truth estimate
uv = "latest"            # runs the REUSE license linter via uvx (see `mise run reuse`)
cargo-nextest = "latest" # the test runner for `mise run test` and CI
bacon = "latest"         # the background check/test loop for `mise run watch`
committed = "latest"     # Conventional-Commits linter for the commit-msg hook (see lefthook.yml)

[env]
# Where upstream C/Rust references are cloned for reading + SLOC measurement.
# Kept out of the workspace (see .gitignore); populate with `mise run clone-ref`.
REFERENCE_DIR = "reference"

[tasks.clone-ref]
description = "M0: shallow-clone upstream libfprint + fprintd + the libfprint-rs FFI binding for reading/measurement"
run = "cargo xtask clone-ref"

[tasks.sloc]
description = "M0: measure upstream libfprint SLOC by subsystem (drivers / nbis / core) with tokei"
run = "cargo xtask sloc"

[tasks.hooks]
description = "Install the git hooks (see lefthook.yml)"
run = "lefthook install"

[tasks.lint]
description = "Repository rules a compiler does not enforce (no shell, no narration)"
run = "cargo xtask lint"

[tasks.test]
description = "Run the workspace tests with nextest (doctests run separately: `cargo test --doc`)"
run = "cargo nextest run --workspace --all-features"

[tasks.watch]
description = "Background check/clippy/test loop on save (bacon)"
run = "bacon"

[tasks.ci-annotate]
description = "Run clippy and emit a GitHub PR annotation for each finding"
run = "cargo xtask ci-annotate"

[tasks.reuse]
description = "Check REUSE/SPDX license compliance"
# `--with charset-normalizer` gives reuse a pure-Python encoding detector, so it
# needs no native libmagic (required on Windows; harmless on Linux with `file`).
run = "uvx --with charset-normalizer reuse lint"

# --- Docker: build + verify the Linux-only crates (shim, daemon) -------------
# The repo runs on Windows; the shim (C libfprint FFI) and daemon (system D-Bus)
# are Linux-only, so they are built and verified inside a container that has
# libfprint (with virtual drivers) compiled from source. See docker/.

[tasks.docker-build]
description = "Build the Linux dev/verify image (pinned libfprint w/ virtual drivers)"
run = "docker compose -f docker/docker-compose.yml build"

[tasks.docker-test]
description = "Run the whole workspace test suite (incl. Linux-only crates) in the container"
run = "docker compose -f docker/docker-compose.yml run --rm dev cargo test --workspace --all-features"

[tasks.docker-shell]
description = "Interactive shell in the Linux dev container (repo bind-mounted at /work)"
run = "docker compose -f docker/docker-compose.yml run --rm dev bash"

[tasks.docker-daemon-verify]
description = "Hardware-free enroll+verify against fprintd over its D-Bus contract"
# The integration test stands up the real daemon on a private bus (its own dbus-daemon) with a
# virtual backend and drives Claim -> EnrollStart -> enroll-completed -> VerifyStart ->
# verify-match -> Release exactly as a client would — the hardware-free daemon verification.
run = "docker compose -f docker/docker-compose.yml run --rm dev cargo test -p fprintd --test dbus_integration -- --nocapture"

[tasks.unit-verify]
description = "Check the systemd unit against real systemd: it parses, and Alias= takes the seat"
run = "cargo xtask unit-verify"

# Supply chain: advisories, the licence boundary ARCHITECTURE.md argues in prose, wildcard pins,
# and source registries. Adds no dependency — cargo-deny is a CLI that reads Cargo.lock.
[tasks.deny]
description = "Check the dependency graph: advisories, licences, wildcard pins, sources"
run = "cargo deny check"

# `reuse lint` accepts a custom LicenseRef-* identifier and crates.io does not, so a green lint is
# no evidence a crate can leave the workspace. This asks the registry's own rules.
[tasks.publish-check]
description = "Check the published crates against the registry's rules: licence, deps, contents"
run = "cargo xtask publish-check"

# --- NBIS oracles: the stock C tools as the ground truth our ports are checked against --------
# Both are DELIBERATE regeneration of frozen goldens, and need reference/nbis-stock + Docker.
# See xtask/src/oracle.rs.

[tasks.clone-ref-nbis]
description = "Clone stock (public-domain) NIST NBIS for the BOZORTH3/MINDTCT oracles (git-ignored)"
run = "cargo xtask clone-ref-nbis"

[tasks.bozorth3-oracle]
description = "DELIBERATE: regenerate the BOZORTH3 golden corpus + scores from the stock C tool"
run = "cargo xtask bozorth3-oracle"

[tasks.mindtct-oracle]
description = "DELIBERATE: regenerate the MINDTCT golden corpus + minutiae/maps from the stock C tool"
run = "cargo xtask mindtct-oracle"

# --- Fuzzing: coverage-guided search behind the seeded sweeps -------------------------------
# DELIBERATE, and for the same reason as the oracles: it needs a nightly toolchain and Docker, and
# a nightly toolchain in CI is a moving dependency that reds the build on rustc's schedule. What a
# campaign finds is frozen as an ordinary test (crates/fprint-fp3/tests/regressions.rs) that needs
# neither. Pass a target and an optional budget: `mise run fuzz fp3_from_bytes 300`.
# See fuzz/Cargo.toml for the wall that keeps libfuzzer-sys out of the published crates.

[tasks.fuzz]
description = "DELIBERATE: fuzz one target in the nightly container (`fuzz <target> [seconds]`)"
run = "cargo xtask fuzz"

# --- Mutation testing: which lines the tests do not defend ----------------------------------
# DELIBERATE because of its size, not its dependencies: it is 5,784 mutants over the published
# crates, and each one is a build and a test run. Nothing else about it is exotic — no container, no
# nightly, no network. A pull request gets the same question asked of its own diff, which is minutes
# rather than hours; see the `mutants` job in .github/workflows/ci.yml.
# Scope it down while working: `cargo mutants -f 'crates/fprint-bozorth3/src/cluster.rs'`.

[tasks.mutants]
description = "DELIBERATE: which lines the tests do not defend (`mutants <base-ref>` for that diff only)"
run = "cargo xtask mutants"
