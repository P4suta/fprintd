#
# What `typos` must not flag. Every entry is a name the NBIS C already chose, not a word this
# project writes. A real misspelling gets fixed, never listed.
#
# `extend-identifiers`, not `extend-words`: an identifier must match whole. `LfsParms` is allowed;
# `Parms` inside another name is not.

[files]
# The MINDTCT corpus is raw 8-bit fingerprint images: bytes, not prose. Read as text the pixel data
# spells letter pairs and each is reported. The BOZORTH3 `.xyt` fixtures are decimal integers.
extend-exclude = ["crates/fprint-mindtct/tests/fixtures/*.raw"]

# Binary test fixtures are payloads, not prose. `extend-exclude` filters directory walks, but the
# pre-commit hook names staged files explicitly, so a type rule turns off content checking in both
# paths.
[type.binfixture]
extend-glob = ["*.bin", "*.png", "*.pcap", "*.pcapng", "*.cassette"]
check-file = false

[default.extend-identifiers]
LfsParms = "LfsParms"             # the parameter block — `lfs.h`
binar = "binar"                   # `binar.c`, cited by the binarization port's docs
iy = "iy"                         # image row index, paired with `ix` — the ports walk stock's grid
match_2nd_pair = "match_2nd_pair" # `matchpat.c` L122
