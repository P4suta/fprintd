#
# Docs site: build the mdBook and the workspace rustdoc, publish both to GitHub Pages.
# The book lands at the site root; the API reference at /api. ARCHITECTURE.md lives at the repo
# root and is staged into docs/ (the book src) before the build.

name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages needs a token to mint the deployment and write the artifact.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; a newer commit waits rather than cancelling a publish in flight.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build the book and the api reference
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: mdbook
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      # `cargo doc --workspace` documents the two C-linking crates (fprintd, fprint-backend-libfprint),
      # so the distro libfprint headers and libclang must be present for libfprint-sys bindgen.
      - name: Refresh the package index
        run: sudo apt-get update
      - name: Install libfprint headers and libclang for the shim's bindgen
        run: sudo apt-get install -y libfprint-2-dev libclang-dev pkg-config
      # ARCHITECTURE.md is the "Concepts / Architecture & provenance" chapter but lives at the repo
      # root; stage it into the book source so mdBook renders it.
      - name: Stage ARCHITECTURE.md into the book source
        run: cp ARCHITECTURE.md docs/ARCHITECTURE.md
      - name: Build the book
        run: mdbook build docs
      - name: Build the workspace API reference
        run: cargo doc --workspace --no-deps
      - name: Assemble the site root
        run: cp -r docs/book _site
      - name: Place the API reference at /api
        run: cp -r target/doc _site/api
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    name: deploy to github pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
