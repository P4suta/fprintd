#
# CodeQL security analysis (Advanced Setup). Scans the Rust source and the repository's own GitHub
# Actions workflows, uploading results to Security > Code scanning. Advanced (not Default) setup
# keeps the language set, query suite, and SHA-pinned action versions in-repo under the same review
# as the code.
#
# Languages:
#   - rust    build-mode: none — the Rust analysis resolves the cargo workspace without a traced
#             build, so it needs no libfprint present for the Linux-only shim crate.
#   - actions the workflows under .github/workflows (CI injection / unsafe checkout / token scope).
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan (Mon 03:27 UTC) so newly-published queries run against unchanged code.
    - cron: "27 3 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write # upload SARIF to code scanning
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: rust
            build-mode: none
          - language: actions
            build-mode: none
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended
      - name: analyze
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v3
        with:
          category: "/language:${{ matrix.language }}"
