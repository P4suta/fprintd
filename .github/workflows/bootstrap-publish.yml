#
# One-time crates.io bootstrap. Trusted Publishing (OIDC) cannot publish a crate that has never
# been published, so the first release of each new crate needs a token. Run from the Actions tab
# (Run workflow, from main), with CARGO_REGISTRY_TOKEN set in the `release` environment.
#
# The other five crates published on the first run; only fprint-backend-libfprint remained (a
# crates.io new-crate rate limit stopped it), so this finishes it.
#
# After it succeeds:
#   1. Register a trusted publisher for each crate on crates.io (owner P4suta, repo fprintd,
#      workflow release.yml, environment release).
#   2. Delete this file and remove CARGO_REGISTRY_TOKEN from the release environment.
#   3. `gh workflow enable release.yml` — OIDC covers every release after this.
name: bootstrap-publish

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bootstrap:
    name: bootstrap publish (one-time)
    runs-on: ubuntu-latest
    environment: release
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      # The shim's publish verify build links libfprint-2 and glib-2.0 through pkg-config.
      - name: install libfprint
        run: sudo apt-get update && sudo apt-get install -y libfprint-2-dev
      # core, bozorth3, mindtct, pipeline, and fp3 are already on crates.io from the first run; only
      # the shim remains. Its dependencies (fprint-core, fprint-fp3) are already indexed.
      - name: publish fprint-backend-libfprint
        run: cargo publish --locked -p fprint-backend-libfprint
