#
# Release automation via release-plz. On push to main:
#   - release-plz-pr:      opens/updates the Release PR (version bump + CHANGELOG) from the
#                          Conventional Commits since the last tag.
#   - release-plz-release: on Release PR merge, publishes the changed crates in dependency order
#                          and cuts the git tag + GitHub release. cargo-semver-checks gates breaking
#                          API changes (release-plz.toml).
#
# Auth is environment-scoped (the `release` GitHub Environment), never repo-level secrets:
#   - A GitHub App mints a short-lived token via actions/create-github-app-token, so the Release PR
#     it opens is authored by the App and retriggers CI (a GITHUB_TOKEN-authored PR does not). Set
#     RELEASE_PLZ_APP_ID and RELEASE_PLZ_APP_PRIVATE_KEY in the `release` environment; the App needs
#     Contents: read/write and Pull requests: read/write, installed on this repository.
#   - crates.io publish uses Trusted Publishing (OIDC) via `id-token: write`, not a stored token.
#     Register a trusted publisher for each published crate on crates.io (owner P4suta, repo
#     fprintd, workflow release.yml, environment release). A brand-new crate's first publish must be
#     done once with a token; OIDC covers every release after that.

name: release

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Publish + GitHub release. Runs on every push to main but no-ops unless a Release PR merge
  # introduced a new version (release_always = false); merging that PR is the human gate.
  release-plz-release:
    name: release-plz release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write # create the git tag + GitHub release
      id-token: write # crates.io Trusted Publishing (OIDC)
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # release-plz reads the full tag history to derive the bump
          token: ${{ steps.app-token.outputs.token }}
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: release-plz/action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9 # v0.5.131
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  # Open/update the Release PR. Same App token so the PR retriggers CI.
  release-plz-pr:
    name: release-plz pr
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      pull-requests: write
    # Serialize PR updates; a second push must not race the first. cancel-in-progress is false.
    concurrency:
      group: release-plz-pr
      cancel-in-progress: false
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: release-plz/action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9 # v0.5.131
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
