#
# Release automation. On every push to main, release-plz opens or updates the Release PR from the
# Conventional Commits since the last tag; on merge it publishes the changed crates in dependency
# order, then tags and cuts the GitHub release. Config: release-plz.toml, cliff.toml.
#
# RELEASE_PLZ_TOKEN is a PAT, not GITHUB_TOKEN, so the Release PR it opens retriggers CI (a PR
# opened by GITHUB_TOKEN does not). CARGO_REGISTRY_TOKEN authenticates the publish to crates.io.

name: release

on:
  push:
    branches: [main]

# Serialize releases. cancel-in-progress is false so an in-flight publish runs to completion.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-plz:
    name: release-plz
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # release-plz reads the full tag history to derive the bump
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0
        with:
          command: release-plz
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
