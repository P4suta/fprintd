# SPDX-License-Identifier: MIT OR Apache-2.0
#
# CI: strict lints + tests on every platform the code runs on.
#
#  * `check`  — pure-Rust crates on Windows and macOS, where the Linux-only shim and daemon compile
#               to (near-)empty crates so `--workspace` needs no libfprint. Covers fprint-core,
#               fprint-fp3, fprint-bozorth3, fprint-mindtct, fprint-backend-native, fprint-integration.
#               Also runs strict rustdoc over the cross-platform library crates.
#  * `linux`  — Linux verification inside the pinned libfprint container: the shim against the real
#               `virtual_device` driver (incl. the M2 byte-identity assertion) and the fprintd D-Bus
#               daemon end-to-end. Lint/test gate for the Linux-only crates. Caches sccache (167 MiB)
#               rather than the target tree. See docker/docker-compose.ci.yml.
#  * `unit`   — the systemd unit against real systemd: it parses, and `Alias=` takes the seat from
#               upstream's unit. See xtask/src/unit.rs.
#  * `msrv`   — the published pure crates on the declared 1.82 (every other job runs latest stable).
#               `--locked`. The three C-linking crates declare 1.85 (the FFI binding is
#               `edition = "2024"`) and are covered by `linux`.
#  * `publish`— the published crates against crates.io's rules. `reuse lint` accepts a custom
#               LicenseRef-* identifier and crates.io does not. See xtask/src/publish.rs.
#  * `deny`   — supply chain: advisories, licence boundary, wildcard pins, source registries.
#               Reads Cargo.lock via `cargo metadata`; needs neither Linux nor Docker.
#  * `reuse`  — SPDX/REUSE license compliance.
#  * `mutants`— which changed lines the tests do not defend. Reports, never gates: a surviving
#               mutant is untested code, not broken code. Lands as an annotation on the diff. The
#               whole-tree run is `mise run mutants`. See xtask/src/mutants.rs.

name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ci-${{ github.ref }}-${{ github.event.merge_group.head_ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Rustfmt
        run: cargo fmt --all --check
      # `--all-features` covers the feature axis: fprint-backend-native's `usb`/nusb seam, the fp3
      # GVariant oracle, mindtct's `unstable-diagnostics`. fprintd compiles to nothing off Linux, so
      # nothing pulls the D-Bus `zvariant` that conflicts with the oracle's `gvariant`; the whole
      # workspace builds here. The `linux` job excludes fp3.
      - name: Clippy (workspace, all targets, all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      # Windows-only re-run of clippy as inline PR annotations (the workspace builds there without
      # libfprint). The gate is the step above; this only annotates.
      - name: Annotate clippy findings on the PR
        if: matrix.os == 'windows-latest'
        run: cargo xtask ci-annotate
      # nextest for unit/integration tests (junit for the summary below); doctests run separately
      # because nextest does not carry them.
      - name: Test (workspace, all features)
        run: cargo nextest run --profile ci --workspace --all-features
      - name: Doctests
        run: cargo test --doc --workspace --all-features
      - name: Test summary
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: target/nextest/ci/junit.xml
          annotate_only: true
      # Strict rustdoc for the cross-platform library surface. The two Linux-only crates document in
      # the `linux` job, where their cfg-gated modules and deps compile.
      - name: Rustdoc (library crates, warnings are errors)
        run: cargo doc --no-deps -p fprint-core -p fprint-fp3 -p fprint-bozorth3 -p fprint-mindtct -p fprint-backend-native -p fprint-integration -p fprint-driverkit
        env:
          RUSTDOCFLAGS: -D warnings

  linux:
    name: linux verify (Docker + libfprint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # The image builds libfprint v1.94.10 from source; the gha cache avoids rebuilding it every
      # run. docker-compose.yml names `fprintd-dev`, so every `run` below picks this up.
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          tags: fprintd-dev
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # The image cache above holds the libfprint build, nothing Rust. This job's `fprintd-target`
      # volume is empty each run, so sccache (167 MiB) carries the 109 third-party crate compilations
      # between runs. Keyed on the lockfile and the image; either moving invalidates the cache.
      # See docker/docker-compose.ci.yml.
      - uses: actions/cache@v6
        with:
          path: .sccache
          key: sccache-linux-${{ hashFiles('Cargo.lock', 'docker/Dockerfile') }}
          restore-keys: sccache-linux-
      # `--exclude fprint-fp3`: its dev-only GVariant oracle pulls `zvariant/gvariant`, which upstream
      # zvariant 5.13.0 miscompiles once the daemon's `zvariant` D-Bus features unify onto the same
      # build (only arises here, where fprintd is real). fp3 is pure and fully covered by the check
      # job. Separate steps, so a failure names itself.
      - name: Clippy the whole workspace (incl. shim & daemon)
        run: >
          docker compose -f docker/docker-compose.yml -f docker/docker-compose.ci.yml run --rm dev
          cargo clippy --workspace --all-targets --all-features --exclude fprint-fp3 -- -D warnings
      - name: Test the whole workspace (incl. shim & daemon)
        run: >
          docker compose -f docker/docker-compose.yml -f docker/docker-compose.ci.yml run --rm dev
          cargo test --workspace --all-features --exclude fprint-fp3
      # These two crates only build on Linux, so this is the only place their intra-doc links are
      # checked.
      - name: Rustdoc (Linux-only crates, warnings are errors)
        run: >
          docker compose -f docker/docker-compose.yml -f docker/docker-compose.ci.yml run --rm
          -e RUSTDOCFLAGS=-D\ warnings dev
          cargo doc --no-deps --all-features -p fprintd -p fprint-backend-libfprint
      # Covered by --all-features above; named separately as the M2 FP3 byte-identity proof against
      # the real C library: Raw via virtual_device, NBIS via virtual_image.
      - name: Shim vs. real libfprint virtual drivers (M2 FP3 byte-identity)
        run: |
          docker compose -f docker/docker-compose.yml -f docker/docker-compose.ci.yml run --rm dev \
            cargo test -p fprint-backend-libfprint --features virtual \
              --test virtual --test virtual_image
      # Prints the cache hit rate. Dependencies should hit and the workspace's own ten crates should
      # miss; a run that misses everything means the key is churning.
      - name: sccache hit rate
        if: always()
        run: >
          docker compose -f docker/docker-compose.yml -f docker/docker-compose.ci.yml run --rm dev
          sccache --show-stats

  unit:
    name: systemd unit (Alias takes the seat)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify the unit against real systemd
        run: cargo xtask unit-verify

  msrv:
    name: msrv (1.82, published pure crates)
    runs-on: ubuntu-latest
    env:
      # rust-toolchain.toml pins stable for a bare `cargo`. RUSTUP_TOOLCHAIN outranks the file, so
      # the 1.82 floor is the one under test.
      RUSTUP_TOOLCHAIN: "1.82"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.82
      - uses: Swatinem/rust-cache@v2
      # The Linux-only crates are absent: they declare 1.85 and would fail here. Their floor is
      # enforced by cargo's `rust-version` and exercised by `linux`.
      - name: Check the pure crates on the declared MSRV
        run: >
          cargo check --locked
          -p fprint-core -p fprint-fp3 -p fprint-bozorth3 -p fprint-mindtct -p fprint-backend-native

  publish:
    name: publish-check (the registry's rules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # publish-check dry-runs `cargo publish --workspace`, which builds the shim crate; its
      # libfprint-sys FFI links libfprint-2 and glib-2.0 through pkg-config.
      - name: install libfprint
        run: sudo apt-get update && sudo apt-get install -y libfprint-2-dev
      - name: Check the published crates package, strip and ship what they claim
        run: cargo xtask publish-check

  deny:
    name: supply chain (advisories, licences, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  reuse:
    name: reuse lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: fsfe/reuse-action@v6

  mutants:
    name: mutants (the diff)
    # A push has no base ref to diff against.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # Bounded: a large diff reports nothing rather than holding a runner. The finding is advisory.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # `git diff origin/<base>...HEAD` needs the base branch and the merge base
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - name: Which of the changed lines the tests do not defend
        # Reports, never gates. Survivors land as annotations on the diff.
        continue-on-error: true
        run: cargo xtask mutants origin/${{ github.base_ref }}

  coverage:
    name: coverage (pure crates, advisory)
    # Reports, never gates, like mutants: coverage says which lines run, not which are defended.
    # Pure crates only; the shim links the C libfprint, which this job does not carry.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-llvm-cov
      - name: Coverage over the published pure crates
        run: >
          cargo llvm-cov nextest --all-features --lcov --output-path lcov.info
          -p fprint-core -p fprint-fp3 -p fprint-bozorth3 -p fprint-mindtct -p fprint-backend-native
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: lcov.info

  # Single aggregation gate — the one status context the branch ruleset requires. `if: always()`
  # so it runs even when a needed job fails; `skipped` counts as pass, so PR-only jobs report green
  # on push and merge_group. `needs` lists the gating jobs only: `mutants` reports rather than gates
  # and `coverage` has no floor, so both are intentionally excluded. Keep this list in step with the
  # gating jobs above.
  ci-required:
    name: ci-required
    if: always()
    needs: [check, linux, unit, msrv, publish, deny, reuse]
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: verify all required jobs passed (skipped counts as pass)
        run: |-
          results="${{ join(needs.*.result, ' ') }}"
          echo "needs results: $results"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::a required job did not pass ($r)"
              exit 1
            fi
          done
          echo "all required jobs passed"
