# SPDX-License-Identifier: MIT OR Apache-2.0
#
# CI: strict lints + tests everywhere the code is meant to run.
#
#  * `check`  — the pure-Rust crates on Windows and macOS. There the Linux-only shim and daemon
#               compile to (near-)empty crates, so a full `--workspace` build needs no libfprint;
#               this run covers fprint-core, fprint-fp3, fprint-bozorth3 and fprint-mindtct (BOZORTH3/MINDTCT golden
#               + M2 FP3 fixture, all Docker-free), fprint-backend-native and fprint-integration, and builds
#               on a non-Linux dev box (the project's actual development environment). It also runs a
#               strict rustdoc build over the cross-platform library crates (warnings are errors).
#  * `linux`  — the authoritative Linux verification inside the pinned libfprint container: the shim
#               against the real `virtual_device` driver (incl. the M2 byte-identity assertion) and
#               the fprintd D-Bus daemon end-to-end. This is where the Linux-only crates are lint
#               and test gated.
#  * `unit`   — the systemd unit, against real systemd: it parses, and `Alias=` takes the seat from
#               upstream's unit. The coexistence design rests on that symlink. See xtask/src/unit.rs.
#  * `msrv`   — the published pure crates on the declared 1.82. Every other job runs latest stable,
#               so without this a broken MSRV goes unnoticed. The three crates that link the C
#               libfprint stack declare 1.85 themselves (the pinned FFI binding is
#               `edition = "2024"`) and are covered by `linux`. `--locked`, so the check is not
#               against a moving dependency graph.
#  * `publish`— the published crates against the registry's own rules. `reuse lint` accepts a
#               custom LicenseRef-* identifier and crates.io does not, so a green REUSE run is no
#               evidence a crate can leave the workspace. See xtask/src/publish.rs.
#  * `reuse`  — SPDX/REUSE license compliance.

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Rustfmt
        run: cargo fmt --all --check
      - name: Clippy (workspace, all targets)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test (workspace)
        run: cargo test --workspace
      # Strict rustdoc for the cross-platform library surface (the public face). The two Linux-only
      # crates document in the `linux` job, where their cfg-gated modules and deps compile.
      - name: Rustdoc (library crates, warnings are errors)
        run: cargo doc --no-deps -p fprint-core -p fprint-fp3 -p fprint-bozorth3 -p fprint-mindtct -p fprint-backend-native -p fprint-integration
        env:
          RUSTDOCFLAGS: -D warnings

  linux:
    name: linux verify (Docker + libfprint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the pinned libfprint dev image
        run: docker compose -f docker/docker-compose.yml build
      # Separate steps, so a failure names itself.
      - name: Clippy the whole workspace (incl. shim & daemon)
        run: >
          docker compose -f docker/docker-compose.yml run --rm dev
          cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test the whole workspace (incl. shim & daemon)
        run: >
          docker compose -f docker/docker-compose.yml run --rm dev
          cargo test --workspace --all-features
      # The `check` job documents everything that builds off Linux. These two only build here,
      # so this is the only place their intra-doc links can be checked at all.
      - name: Rustdoc (Linux-only crates, warnings are errors)
        run: >
          docker compose -f docker/docker-compose.yml run --rm -e RUSTDOCFLAGS=-D\ warnings dev
          cargo doc --no-deps --all-features -p fprintd -p fprint-backend-libfprint
      # Already covered by --all-features above; named separately because these two are the M2
      # FP3 byte-identity proof against the real C library — Raw via virtual_device, NBIS via
      # virtual_image — and a silent loss of either would matter.
      - name: Shim vs. real libfprint virtual drivers (M2 FP3 byte-identity)
        run: |
          docker compose -f docker/docker-compose.yml run --rm dev \
            cargo test -p fprint-backend-libfprint --features virtual \
              --test virtual --test virtual_image

  unit:
    name: systemd unit (Alias takes the seat)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify the unit against real systemd
        run: cargo xtask unit-verify

  msrv:
    name: msrv (1.82, published pure crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.82
      - uses: Swatinem/rust-cache@v2
      # The Linux-only crates are deliberately absent: they declare 1.85 and would fail here by
      # design. Their floor is enforced by cargo itself (`rust-version`), and exercised by `linux`.
      - name: Check the pure crates on the declared MSRV
        run: >
          cargo check --locked
          -p fprint-core -p fprint-fp3 -p fprint-bozorth3 -p fprint-mindtct -p fprint-backend-native

  publish:
    name: publish-check (the registry's rules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check the published crates package, strip and ship what they claim
        run: cargo xtask publish-check

  reuse:
    name: reuse lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: fsfe/reuse-action@v5
