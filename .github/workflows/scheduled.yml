#
# Weekly checks that a pull request does not trigger.
#
#  * `advisories` — new advisories against unchanged code, which push-triggered CI never sees.
#  * `beta`       — the frozen NBIS goldens against the next toolchain. `docs/mindtct-algorithm.md`
#                   names libm `cos`/`sin` ULP as the main cross-platform hazard; Rust lowers those
#                   to the *system* libm, so CI's OS matrix is a differential libm test. Running on
#                   `beta` finds drift six weeks ahead of the release train.

name: scheduled

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  advisories:
    name: new advisories on unchanged code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories

  beta:
    name: toolchain canary (${{ matrix.os }}, beta)
    strategy:
      fail-fast: false
      matrix:
        # The two libms most likely to disagree: the MSVC CRT and glibc.
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
      # rust-toolchain.toml pins stable for a bare `cargo`. RUSTUP_TOOLCHAIN outranks the file, so
      # the beta toolchain is used.
      RUSTUP_TOOLCHAIN: beta
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@beta
      - uses: Swatinem/rust-cache@v2
      # `RUSTFLAGS: -D warnings` is absent, unlike ci.yml: a new lint firing on beta is not a
      # bit-exactness signal and must not mask one.
      - name: Goldens against the next toolchain
        run: cargo test --workspace --all-features
